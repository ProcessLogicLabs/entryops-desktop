<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 60">
  <defs>
    <linearGradient id="eo-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74c4dc"/>
      <stop offset="100%" stop-color="#3a7a8d"/>
    </linearGradient>
    <linearGradient id="eo-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a18bff"/>
      <stop offset="100%" stop-color="#5d3fd3"/>
    </linearGradient>
  </defs>

  <!-- Five cascading chevrons, scaled from the EntryOps cloud mark
       (240x200 → ~60x55 in this header). Anchored at left. ViewBox is
       tight to content so descenders on the wordmark don't get clipped
       when the host renders the image at a small fixed height. -->
  <g transform="translate(8, -5) scale(0.28)">
    <path d="M 15 40 L 75 100 L 15 160 L 50 160 L 110 100 L 50 40 Z"
          fill="#2e4750" opacity="0.7"/>
    <path d="M 40 40 L 100 100 L 40 160 L 75 160 L 135 100 L 75 40 Z"
          fill="#4a8fa3"/>
    <path d="M 65 40 L 125 100 L 65 160 L 100 160 L 160 100 L 100 40 Z"
          fill="url(#eo-cyan)"/>
    <path d="M 90 40 L 150 100 L 90 160 L 125 160 L 185 100 L 125 40 Z"
          fill="url(#eo-purple)" opacity="0.55"/>
    <path d="M 115 40 L 175 100 L 115 160 L 150 160 L 210 100 L 150 40 Z"
          fill="url(#eo-purple)"/>
  </g>

  <!-- Wordmark: "Entry" slate, "Ops" purple gradient. Baseline at y=36
       leaves enough headroom in the 60-tall viewBox for the lowercase
       p descender (~y=46) without clipping. -->
  <text x="78" y="36" font-family="system-ui, -apple-system, sans-serif"
        font-size="38" font-weight="600" fill="#1e293b">
    Entry<tspan fill="url(#eo-purple)">Ops</tspan>
  </text>
</svg>

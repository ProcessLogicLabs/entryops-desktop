<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e2c33"/>
      <stop offset="100%" stop-color="#2e4750"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#74c4dc"/>
      <stop offset="100%" stop-color="#3a7a8d"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a18bff"/>
      <stop offset="100%" stop-color="#5d3fd3"/>
    </linearGradient>
  </defs>

  <!-- Dark teal rounded background so the chevrons read at favicon size. -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Five cascading chevrons, scaled & centered in 512×512. -->
  <g transform="translate(40, 96) scale(1.85)">
    <path d="M 15 40 L 75 100 L 15 160 L 50 160 L 110 100 L 50 40 Z"
          fill="#4a8fa3" opacity="0.8"/>
    <path d="M 40 40 L 100 100 L 40 160 L 75 160 L 135 100 L 75 40 Z"
          fill="#4a8fa3"/>
    <path d="M 65 40 L 125 100 L 65 160 L 100 160 L 160 100 L 100 40 Z"
          fill="url(#cyan)"/>
    <path d="M 90 40 L 150 100 L 90 160 L 125 160 L 185 100 L 125 40 Z"
          fill="url(#purple)" opacity="0.65"/>
    <path d="M 115 40 L 175 100 L 115 160 L 150 160 L 210 100 L 150 40 Z"
          fill="url(#purple)"/>
  </g>
</svg>
